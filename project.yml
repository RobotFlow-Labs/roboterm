name: roboterm
options:
  bundleIdPrefix: com.robotflowlabs
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38.0"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: 1.2.5

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_ENTITLEMENTS: roboterm.entitlements
    INFOPLIST_FILE: Resources/Info.plist

targets:
  roboterm:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
    resources:
      - path: Resources
        type: group
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robotflowlabs.roboterm
        PRODUCT_NAME: ROBOTERM
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        OTHER_LDFLAGS:
          - "-framework"
          - UniformTypeIdentifiers
          - "-framework"
          - Carbon
          - "-framework"
          - IOKit
    dependencies:
      - package: SwiftTerm
        product: SwiftTerm
