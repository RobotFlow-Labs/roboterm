<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px;
    height: 1024px;
    background: #050505;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Outer border */
  .border {
    position: absolute;
    top: 40px; left: 40px; right: 40px; bottom: 40px;
    border: 4px solid rgba(255, 59, 0, 0.3);
  }

  /* Corner brackets */
  .corner { position: absolute; width: 60px; height: 60px; }
  .corner.tl { top: 20px; left: 20px; border-top: 6px solid #FF3B00; border-left: 6px solid #FF3B00; }
  .corner.tr { top: 20px; right: 20px; border-top: 6px solid #FF3B00; border-right: 6px solid #FF3B00; }
  .corner.bl { bottom: 20px; left: 20px; border-bottom: 6px solid #FF3B00; border-left: 6px solid #FF3B00; }
  .corner.br { bottom: 20px; right: 20px; border-bottom: 6px solid #FF3B00; border-right: 6px solid #FF3B00; }

  /* Terminal prompt lines */
  .terminal {
    position: absolute;
    top: 120px;
    left: 100px;
    right: 100px;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
    font-size: 28px;
    color: rgba(255, 255, 255, 0.15);
    line-height: 1.6;
  }
  .terminal .line { white-space: nowrap; overflow: hidden; }
  .terminal .prompt { color: #00FF88; }
  .terminal .cmd { color: rgba(255,255,255,0.2); }

  /* Main text */
  .main {
    text-align: center;
    z-index: 2;
  }

  .r {
    font-family: 'Oswald', 'Helvetica Neue', sans-serif;
    font-size: 200px;
    font-weight: 800;
    color: #f3f3f3;
    letter-spacing: 8px;
    line-height: 1;
  }
  .r .accent { color: #FF3B00; }

  .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 36px;
    letter-spacing: 12px;
    color: #FF3B00;
    opacity: 0.7;
    margin-top: 20px;
  }

  /* Status dot */
  .dot {
    width: 20px;
    height: 20px;
    background: #00FF88;
    border-radius: 50%;
    margin: 30px auto 0;
    box-shadow: 0 0 20px rgba(0,255,136,0.5);
  }

  /* Scan lines */
  body::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(255,59,0,0.02) 3px, rgba(255,59,0,0.02) 6px
    );
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div class="border"></div>

  <div class="terminal">
    <div class="line"><span class="prompt">></span> <span class="cmd">ros2 node list</span></div>
    <div class="line"><span class="prompt">></span> <span class="cmd">rt status</span></div>
    <div class="line"><span class="prompt">></span> <span class="cmd">claude</span></div>
  </div>

  <div class="main">
    <div class="r">R<span class="accent">T</span></div>
    <div class="sub">ROBOTERM</div>
    <div class="dot"></div>
  </div>
</body>
</html>
